<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>POMO / DAY PLANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --work-color: #e8ff47;
    --short-color: #47d9ff;
    --long-color: #b47fff;
    --done-color: #4dff9b;
    --radius: 4px;
    --mode-color: #e8ff47;
  }

  html, body {
    height: 100%;
    height: 100dvh;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
    gap: 16px;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, var(--mode-color) 0%, transparent 60%);
    transition: background .4s;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--mode-color);
    transition: color .4s;
  }
  .logo span { color: var(--muted); }
  .header-stats {
    display: flex; gap: 20px;
    font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .header-stats strong { color: var(--text); font-size: 13px; display: block; margin-top: 1px; }

  .btn-new-day {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-new-day:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .btn-new-day:active {
    background: var(--surface2);
  }

  /* ── TAB NAV (mobile bottom nav) ── */
  .tab-nav {
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .tab-nav-btn {
    flex: 1;
    padding: 12px 0 10px;
    background: none; border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-top: 2px solid transparent;
    transition: all .15s;
  }
  .tab-nav-btn.active {
    color: var(--mode-color);
    border-top-color: var(--mode-color);
  }
  .tab-nav-btn .nav-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* ── PAGES ── */
  .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .page.active { display: flex; }

  /* ── TIMER PAGE ── */
  .timer-page {
    align-items: center;
    padding: 16px 20px 12px;
    gap: 14px;
    overflow-y: auto;
  }

  .mode-tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    padding: 3px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    width: 100%;
  }
  .mode-tab {
    flex: 1;
    padding: 6px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all .15s;
    white-space: nowrap;
  }
  .mode-tab.active {
    background: var(--mode-color);
    color: #000;
    font-weight: 500;
  }

  /* CLOCK */
  .clock-container {
    position: relative;
    width: min(220px, 60vw);
    height: min(220px, 60vw);
    flex-shrink: 0;
  }
  .clock-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .clock-track { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .clock-progress {
    fill: none; stroke-width: 10;
    stroke-linecap: round;
    stroke: var(--mode-color);
    transition: stroke-dashoffset 1s linear, stroke .4s;
    filter: drop-shadow(0 0 8px var(--mode-color));
  }
  .clock-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 14vw, 68px);
    line-height: 1;
    letter-spacing: 2px;
    color: var(--text);
  }
  .mode-label {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--mode-color);
    margin-top: 3px;
  }

  /* DOTS */
  .session-dots { display: flex; gap: 8px; align-items: center; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    transition: all .3s;
  }
  .dot.done { background: var(--work-color); border-color: var(--work-color); box-shadow: 0 0 6px var(--work-color); }
  .dot.current { background: var(--mode-color); border-color: var(--mode-color); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* CONTROLS */
  .controls { display: flex; gap: 10px; align-items: center; width: 100%; justify-content: center; }
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: var(--mode-color);
    color: #000;
    border-color: var(--mode-color);
    font-weight: 500;
    min-width: 110px;
  }
  .btn-ghost {
    background: none; color: var(--muted);
    border-color: var(--border);
  }

  /* CURRENT TASK */
  .current-task-block {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--mode-color);
    padding: 10px 14px;
    border-radius: var(--radius);
    transition: border-color .4s;
  }
  .current-task-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .current-task-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .current-task-name.empty { color: var(--muted); font-style: italic; }

  /* SETTINGS */
  .settings-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%;
  }
  .setting-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    text-align: center;
  }
  .setting-block label { display: block; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .setting-block input[type=number] {
    width: 100%; background: none; border: none; outline: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text);
    text-align: center; cursor: pointer;
  }
  .setting-block input[type=number]::-webkit-inner-spin-button { opacity: 0; }

  /* ── TASKS PAGE ── */
  .tasks-page { overflow: hidden; flex-direction: column; }
  .tasks-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: flex; flex-direction: column;
  }
  .tasks-scroll::-webkit-scrollbar { width: 3px; }
  .tasks-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .panel-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; color: var(--text);
  }
  .task-count {
    font-size: 10px; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px;
  }

  .add-task-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 6px;
    flex-shrink: 0;
    align-items: center;
    overflow: hidden;
  }
  .add-task-input {
    flex: 1; min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .add-task-input:focus { border-color: var(--accent); }
  .add-task-input::placeholder { color: var(--muted); }
  .pomo-stepper {
    display: flex; align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    flex-shrink: 0;
  }
  .pomo-step-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 14px; line-height: 1;
    padding: 0 6px; height: 36px;
    cursor: pointer;
    transition: color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .pomo-step-btn:hover { color: var(--text); background: var(--surface2); }
  .pomo-count-input {
    width: 22px; text-align: center;
    background: none;
    border: none;
    padding: 0;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
    outline: none;
  }
  .pomo-count-input::-webkit-inner-spin-button { display: none; }
  .pomo-count-input[type=number] { -moz-appearance: textfield; appearance: textfield; }

  .task-list {
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 6px;
  }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .task-item::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    opacity: 0; transition: opacity .15s;
  }
  .task-item.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .task-item.active::before { opacity: 1; }
  .task-item.done { opacity: .45; }
  .task-item.done .task-name { text-decoration: line-through; }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
    font-size: 11px;
  }
  .task-item.done .task-check { background: var(--done-color); border-color: var(--done-color); color: #000; }

  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-name-edit {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 2px;
    padding: 1px 4px;
    width: 100%; outline: none;
  }
  .task-pomo-info { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .task-notes-toggle {
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; padding: 3px 0; margin-top: 3px;
    -webkit-tap-highlight-color: transparent;
  }
  .task-notes-area {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 2px;
    color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 6px 8px; margin-top: 4px;
    resize: vertical; min-height: 52px; outline: none;
  }
  .mini-dots { display: flex; gap: 3px; }
  .mini-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .mini-dot.done { background: var(--work-color); }
  .mini-dot.done.over { background: #ffaa33; }
  .mini-dot.current { background: var(--accent2); animation: pulse 1.5s infinite; }

  .task-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px;
    transition: color .15s;
    flex-shrink: 0; padding: 4px 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .task-delete:active { color: var(--accent2); }

  .task-item.dragging { opacity: 0.4; }
  .task-item.drag-over { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, var(--surface)); }
  .task-item[draggable="true"] { cursor: grab; }
  .task-item[draggable="true"]:active { cursor: grabbing; }

  .empty-tasks {
    padding: 40px 20px; text-align: center;
    color: var(--muted); font-size: 11px; letter-spacing: 1px;
  }
  .empty-tasks .big { font-family: 'Bebas Neue', sans-serif; font-size: 28px; display: block; color: var(--surface2); letter-spacing: 3px; margin-bottom: 8px; }

  /* LOG */
  .log-panel {
    border-top: 1px solid var(--border);
    padding: 8px 16px;
  }
  .log-header { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .log-entry {
    font-size: 10px; color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px solid var(--surface2);
    display: flex; gap: 10px;
  }
  .log-time { color: var(--mode-color); flex-shrink: 0; }
  .log-empty { font-size: 10px; color: var(--surface2); font-style: italic; }

  .history-section { border-top: 1px solid var(--border); }
  .history-chart {
    display: flex; align-items: flex-end; gap: 4px;
    padding: 8px 16px 4px; height: 64px;
  }
  .hbar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .hbar-fill { width: 100%; background: var(--work-color); border-radius: 2px 2px 0 0; min-height: 2px; transition: height .3s; }
  .hbar-count { font-size: 8px; color: var(--muted); margin-top: 2px; height: 10px; }
  .hbar-label { font-size: 8px; color: var(--muted); letter-spacing: 1px; }

  /* NOTIFY */
  .notify {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-6px);
    background: var(--surface);
    border: 1px solid var(--mode-color);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 12px; color: var(--text);
    box-shadow: 0 0 24px color-mix(in srgb, var(--mode-color) 30%, transparent);
    opacity: 0;
    transition: all .3s;
    z-index: 100; pointer-events: none;
    width: calc(100% - 32px); max-width: 320px;
  }
  .notify.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .notify-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--mode-color); }

  .day-banner {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 11px; color: var(--text);
    display: flex; align-items: center; gap: 10px;
    opacity: 0; transition: all .3s;
    z-index: 99; pointer-events: none;
    width: calc(100% - 32px); max-width: 340px;
  }
  .day-banner.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
  .day-banner-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  /* DESKTOP: side-by-side layout */
  @media (min-width: 700px) {
    body {
      display: grid;
      grid-template-columns: 1fr minmax(340px, 400px);
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header { grid-column: 1 / -1; gap: 24px; }
    .tab-nav { display: none; }

    #pageTimer, #pageTasks { display: flex; }

    .timer-page {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 32px 36px 24px;
      gap: 22px;
    }

    .clock-container {
      width: 260px; height: 260px;
    }

    .tasks-page { grid-row: 2; grid-column: 2; overflow: hidden; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">POMO<span>/</span>DAY</div>
  <div class="header-stats">
    <div>Sessions<strong id="statSessions">0</strong></div>
    <div>Focus<strong id="statFocus">0m</strong></div>
    <div>Done<strong id="statDone">0</strong></div>
  </div>
  <button class="btn-new-day" id="btnNewDay" onclick="startNewDay()">New Day</button>
</header>

<!-- TIMER PAGE -->
<div class="page timer-page active" id="pageTimer">

  <div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="work">Work</button>
    <button class="mode-tab" data-mode="short">Short Brk</button>
    <button class="mode-tab" data-mode="long">Long Brk</button>
  </div>

  <div class="clock-container">
    <svg class="clock-svg" viewBox="0 0 280 280">
      <circle class="clock-track" cx="140" cy="140" r="122"/>
      <circle class="clock-progress" id="clockRing" cx="140" cy="140" r="122"
        stroke-dasharray="766.5" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-inner">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="mode-label" id="modeLabel">Work</div>
    </div>
  </div>

  <div class="session-dots" id="sessionDots"></div>

  <div class="controls">
    <button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>
    <button class="btn btn-primary" id="btnStart" onclick="toggleTimer()">START</button>
    <button class="btn btn-ghost" onclick="skipSession()">Skip →</button>
    <button class="btn btn-ghost" id="btnSound" onclick="toggleSound()" title="Toggle sound">♪</button>
  </div>

  <div class="current-task-block">
    <div class="current-task-label">Now working on</div>
    <div class="current-task-name empty" id="currentTaskName">— no task selected —</div>
  </div>

  <div class="settings-row">
    <div class="setting-block">
      <label>Work</label>
      <input type="number" id="setWork" value="25" min="1" max="90" onchange="updateSettings()">
    </div>
    <div class="setting-block">
      <label>Short Brk</label>
      <input type="number" id="setShort" value="5" min="1" max="30" onchange="updateSettings()">
    </div>
    <div class="setting-block">
      <label>Long Brk</label>
      <input type="number" id="setLong" value="15" min="1" max="60" onchange="updateSettings()">
    </div>
  </div>

</div>

<!-- TASKS PAGE -->
<div class="page tasks-page" id="pageTasks">
  <div class="panel-header">
    <div class="panel-title">Today's Tasks</div>
    <div class="task-count" id="taskCount">0 tasks</div>
  </div>

  <div class="add-task-row">
    <input class="add-task-input" id="taskInput" type="text" placeholder="Add a task…" maxlength="60"
      onkeydown="if(event.key==='Enter') addTask()">
    <div class="pomo-stepper">
      <button class="pomo-step-btn" onclick="stepPomo(-1)" tabindex="-1">−</button>
      <input class="pomo-count-input" id="pomoInput" type="number" step="1" min="1" max="20" value="1" title="Pomodoros">
      <button class="pomo-step-btn" onclick="stepPomo(1)" tabindex="-1">+</button>
    </div>
    <button class="btn btn-primary" style="padding:9px 14px;font-size:11px;" onclick="addTask()">+</button>
  </div>

  <div class="tasks-scroll">
    <div class="task-list" id="taskList"></div>

    <div class="history-section">
      <div class="panel-header" style="padding:10px 20px 8px;">
        <div class="panel-title" style="font-size:13px;">7-Day History</div>
      </div>
      <div class="history-chart" id="historyChart"></div>
    </div>

    <div class="log-panel">
      <div class="log-header">Activity Log</div>
      <div id="logEntries"><div class="log-empty">No activity yet</div></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV (mobile only) -->
<nav class="tab-nav">
  <button class="tab-nav-btn active" id="navTimer" onclick="switchTab('timer')">
    <span class="nav-icon">⏱</span>Timer
  </button>
  <button class="tab-nav-btn" id="navTasks" onclick="switchTab('tasks')">
    <span class="nav-icon">📋</span>Tasks
  </button>
</nav>

<div class="day-banner" id="dayBanner">
  <span class="day-banner-text"></span>
  <button class="day-banner-close" onclick="this.parentElement.classList.remove('show')">×</button>
</div>

<div class="notify" id="notify">
  <div class="notify-title" id="notifyTitle">Break time!</div>
  <div id="notifyBody">Good work. Take a breather.</div>
</div>

<script>
const COLORS = { work: '#e8ff47', short: '#47d9ff', long: '#b47fff' };
const LABELS = { work: 'Work', short: 'Short Break', long: 'Long Break' };
const BREAK_SUGGESTIONS = [
  'stretch for 2 minutes',
  'drink a glass of water',
  'close your eyes for 20 seconds',
  'stand up and walk around',
  'look at something 20 feet away',
  'take 5 deep breaths',
  'roll your shoulders back'
];
let _breakSugIdx = 0;

let state = {
  mode: 'work',
  running: false,
  seconds: 25 * 60,
  totalSeconds: 25 * 60,
  sessionInCycle: 0,
  sessionsCompleted: 0,
  totalFocusMin: 0,
  tasks: [],
  activeTaskId: null,
  log: [],
  lastDate: null,
  editingTaskId: null,
  soundEnabled: true,
  history: {},
  sessionTaskTime: {}
};

let timer = null;
let timerStartedAt = null;
let secondsAtStart = null;
let dragSrcId = null;
const CIRCUMFERENCE = 2 * Math.PI * 122;

// ── TAB SWITCH ──
function switchTab(tab) {
  document.getElementById('pageTimer').classList.toggle('active', tab === 'timer');
  document.getElementById('pageTasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('navTimer').classList.toggle('active', tab === 'timer');
  document.getElementById('navTasks').classList.toggle('active', tab === 'tasks');
}

// ── SETTINGS ──
function getSettings() {
  return {
    work: parseInt(document.getElementById('setWork').value) || 25,
    short: parseInt(document.getElementById('setShort').value) || 5,
    long: parseInt(document.getElementById('setLong').value) || 15
  };
}
function updateSettings() {
  if (!state.running) {
    const s = getSettings();
    state.totalSeconds = s[state.mode] * 60;
    state.seconds = state.totalSeconds;
    renderClock();
    saveState();
  }
}

// ── MODE ──
function setMode(mode) {
  if (state.running) return;
  state.mode = mode;
  const s = getSettings();
  state.totalSeconds = s[mode] * 60;
  state.seconds = state.totalSeconds;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('modeLabel').textContent = LABELS[mode];
  applyColor(COLORS[mode]);
  if (mode === 'short' || mode === 'long') {
    showBreakSuggestion();
  } else if (mode === 'work') {
    renderCurrentTask();
  }
  renderClock();
}

function applyColor(color) {
  document.documentElement.style.setProperty('--mode-color', color);
}

function renderCurrentTask() {
  const el = document.getElementById('currentTaskName');
  if (!el) return;
  if (state.mode === 'short' || state.mode === 'long') return;
  const t = state.tasks.find(t => t.id === state.activeTaskId);
  if (state.activeTaskId && t) { el.textContent = t.name; el.classList.remove('empty'); }
  else { el.textContent = '— no task selected —'; el.classList.add('empty'); }
}

function showBreakSuggestion() {
  const el = document.getElementById('currentTaskName');
  if (!el) return;
  el.textContent = BREAK_SUGGESTIONS[_breakSugIdx % BREAK_SUGGESTIONS.length];
  el.classList.add('empty');
  _breakSugIdx++;
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => setMode(tab.dataset.mode));
});

// ── TIMER ──
function toggleTimer() {
  state.running ? pauseTimer() : startTimer();
}
function startTimer() {
  timerStartedAt = Date.now();
  secondsAtStart = state.seconds;
  state.running = true;
  document.getElementById('btnStart').textContent = 'PAUSE';
  timer = setInterval(tick, 500);
}
function pauseTimer() {
  state.running = false;
  clearInterval(timer);
  timerStartedAt = null;
  secondsAtStart = null;
  document.getElementById('btnStart').textContent = 'START';
}
function resetTimer() {
  pauseTimer();
  const s = getSettings();
  state.seconds = s[state.mode] * 60;
  state.totalSeconds = state.seconds;
  state.sessionTaskTime = {};
  renderClock();
}
function skipSession() {
  pauseTimer();
  onSessionEnd(true);
}
function tick() {
  const elapsed = Math.floor((Date.now() - timerStartedAt) / 1000);
  const remaining = secondsAtStart - elapsed;
  if (remaining <= 0) { onSessionEnd(false); return; }
  if (state.mode === 'work' && state.activeTaskId !== null) {
    const prevRemaining = state.seconds;
    const secondsElapsedThisTick = prevRemaining - remaining;
    if (secondsElapsedThisTick > 0) {
      state.sessionTaskTime[state.activeTaskId] = (state.sessionTaskTime[state.activeTaskId] || 0) + secondsElapsedThisTick;
    }
  }
  state.seconds = remaining;
  renderClock();
}
// Credit a pomo to every task that has met the 60% threshold this session.
// Returns true if at least one task was credited.
function creditPomoIfEarned() {
  const POMO_THRESHOLD_SEC = Math.floor(getSettings().work * 60 * 0.6);
  let credited = false;
  Object.entries(state.sessionTaskTime).forEach(([idStr, secs]) => {
    if (secs >= POMO_THRESHOLD_SEC) {
      const t = state.tasks.find(t => t.id === parseInt(idStr));
      if (t) { t.pomoDone++; credited = true; }
    }
  });
  if (credited) renderTasks();
  return credited;
}

function onSessionEnd(skipped) {
  pauseTimer();
  if (state.mode === 'work') {
    if (skipped) {
      // Credit pomo even on skip if threshold was met
      creditPomoIfEarned();
    } else {
      playBeep(880, 0.6);
      state.sessionsCompleted++;
      state.sessionInCycle++;
      state.totalFocusMin += getSettings().work;
      const today = new Date().toDateString();
      state.history[today] = (state.history[today] || 0) + 1;
      addLog('Completed work session');
      creditPomoIfEarned();
    }
    state.sessionTaskTime = {};
    if (!skipped) {
      if (state.sessionInCycle >= 4) {
        state.sessionInCycle = 0;
        notify('Long Break!', 'You finished 4 sessions. Enjoy a long rest.');
        setMode('long');
      } else {
        notify('Short Break!', 'Nice work. Take a quick breather.');
        setMode('short');
      }
    } else {
      setMode('short');
    }
  } else if (!skipped && (state.mode === 'short' || state.mode === 'long')) {
    playBeep(660, 0.4);
    addLog('Finished ' + LABELS[state.mode]);
    notify('Back to work!', "Break over. Let's go again.");
    setMode('work');
  } else {
    state.sessionTaskTime = {};
    setMode('work');
  }
  renderStats();
  renderDots();
  renderHistory();
  saveState();
  updateNewDayButton();
  startTimer();
}

// ── CLOCK ──
function renderClock() {
  const mins = Math.floor(state.seconds / 60).toString().padStart(2, '0');
  const secs = (state.seconds % 60).toString().padStart(2, '0');
  document.getElementById('timeDisplay').textContent = mins + ':' + secs;
  const pct = state.seconds / state.totalSeconds;
  document.getElementById('clockRing').style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
}

// ── DOTS ──
function renderDots() {
  const container = document.getElementById('sessionDots');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    if (i < state.sessionInCycle) d.classList.add('done');
    else if (i === state.sessionInCycle && state.mode === 'work') d.classList.add('current');
    container.appendChild(d);
  }
}

// ── TASKS ──
function stepPomo(delta) {
  const inp = document.getElementById('pomoInput');
  const val = Math.min(20, Math.max(1, (parseInt(inp.value) || 1) + delta));
  inp.value = val;
}

function addTask() {
  const input = document.getElementById('taskInput');
  const pomoIn = document.getElementById('pomoInput');
  const name = input.value.trim();
  if (!name) return;
  state.tasks.push({ id: Date.now(), name, pomoEstimate: parseInt(pomoIn.value) || 2, pomoDone: 0, done: false, notes: '' });
  input.value = ''; pomoIn.value = '2';
  input.focus();
  renderTasks();
  addLog('Added: "' + name + '"');
  saveState();
}

function selectTask(id) {
  const switching = state.running && state.mode === 'work' && state.activeTaskId !== null && state.activeTaskId !== id;
  if (switching) {
    // Credit the outgoing task immediately if threshold met, then reset session
    creditPomoIfEarned();
    state.sessionTaskTime = {};
    pauseTimer();
  }
  state.activeTaskId = state.activeTaskId === id ? null : id;
  if (switching) {
    // Reset clock to full work duration for the new task
    const s = getSettings();
    state.totalSeconds = s.work * 60;
    state.seconds = state.totalSeconds;
    renderClock();
    startTimer();
  }
  renderTasks();
  renderCurrentTask();
  saveState();
}

function toggleDone(id, e) {
  e.stopPropagation();
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) {
    addLog('Completed: "' + t.name + '"');
    if (state.activeTaskId === id) state.activeTaskId = null;
  }
  renderTasks(); renderStats();
  renderCurrentTask();
  saveState();
}

function deleteTask(id, e) {
  e.stopPropagation();
  state.tasks = state.tasks.filter(t => t.id !== id);
  if (state.activeTaskId === id) state.activeTaskId = null;
  renderTasks(); renderStats();
  renderCurrentTask();
  saveState();
}

function editTask(id) {
  state.editingTaskId = state.editingTaskId === id ? null : id;
  renderTasks();
}
function commitEdit(id, value) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  const trimmed = value.trim();
  if (trimmed) t.name = trimmed;
  state.editingTaskId = null;
  renderTasks();
  saveState();
}

function toggleNotes(id, e) {
  e.stopPropagation();
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t._notesOpen = !t._notesOpen;
  renderTasks();
}
function saveNote(id, value) {
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.notes = value;
  saveState();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  if (state.tasks.length === 0) {
    list.innerHTML = '<div class="empty-tasks"><span class="big">NO TASKS</span>Add something to focus on ↑</div>';
    document.getElementById('taskCount').textContent = '0 tasks';
    return;
  }
  const sorted = [...state.tasks];
  list.innerHTML = sorted.map(t => {
    const dotCount = Math.max(t.pomoEstimate, t.pomoDone);
    const dots = Array.from({length: dotCount}, (_, i) => {
      let cls = 'mini-dot';
      if (i < t.pomoDone) cls += i < t.pomoEstimate ? ' done' : ' done over';
      else if (i === t.pomoDone && !t.done && t.id === state.activeTaskId && state.mode === 'work') cls += ' current';
      return '<div class="' + cls + '"></div>';
    }).join('');
    const nameEl = t.id === state.editingTaskId
      ? '<input class="task-name-edit" value="' + escHtml(t.name) + '"'
        + ' onblur="commitEdit(' + t.id + ', this.value)"'
        + ' onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){state.editingTaskId=null;renderTasks();}"'
        + ' onclick="event.stopPropagation()">'
      : '<div class="task-name" ondblclick="editTask(' + t.id + ')">' + escHtml(t.name) + '</div>';
    return '<div class="task-item ' + (t.done ? 'done' : '') + ' ' + (t.id === state.activeTaskId ? 'active' : '') + '" draggable="true" data-id="' + t.id + '" onclick="selectTask(' + t.id + ')">'
      + '<div class="task-check" onclick="toggleDone(' + t.id + ', event)">' + (t.done ? '✓' : '') + '</div>'
      + '<div class="task-info">'
      + nameEl
      + '<div class="task-pomo-info"><div class="mini-dots">' + dots + '</div><span>' + t.pomoDone + '/' + t.pomoEstimate + ' pomo</span></div>'
      + '<button class="task-notes-toggle" onclick="toggleNotes(' + t.id + ', event)">'
      + (t.notes ? '▾ note' : '▸ note') + '</button>'
      + (t._notesOpen
          ? '<textarea class="task-notes-area" onchange="saveNote(' + t.id + ', this.value)"'
            + ' onclick="event.stopPropagation()" placeholder="Add a note…">'
            + escHtml(t.notes || '') + '</textarea>'
          : '')
      + '</div>'
      + '<button class="task-delete" onclick="deleteTask(' + t.id + ', event)" title="Remove">×</button>'
      + '</div>';
  }).join('');
  if (state.editingTaskId !== null) {
    const inp = list.querySelector('.task-name-edit');
    if (inp) { inp.focus(); inp.select(); }
  }
  const done = state.tasks.filter(t => t.done).length;
  document.getElementById('taskCount').textContent = done + '/' + state.tasks.length + ' done';
}

// ── DRAG & DROP (delegated, wired once) ──
function initDragDrop() {
  const list = document.getElementById('taskList');
  list.addEventListener('dragstart', e => {
    const item = e.target.closest('.task-item');
    if (!item) return;
    dragSrcId = parseInt(item.dataset.id);
    e.dataTransfer.effectAllowed = 'move';
    item.classList.add('dragging');
  });
  list.addEventListener('dragend', e => {
    const item = e.target.closest('.task-item');
    if (item) item.classList.remove('dragging');
    list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  });
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.task-item');
    if (item) {
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    }
  });
  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      list.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    }
  });
  list.addEventListener('drop', e => {
    e.preventDefault();
    const item = e.target.closest('.task-item');
    if (!item) return;
    item.classList.remove('drag-over');
    const targetId = parseInt(item.dataset.id);
    if (!dragSrcId || dragSrcId === targetId) return;
    const srcIdx = state.tasks.findIndex(t => t.id === dragSrcId);
    const tgtIdx = state.tasks.findIndex(t => t.id === targetId);
    dragSrcId = null;
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = state.tasks.splice(srcIdx, 1);
    state.tasks.splice(tgtIdx, 0, moved);
    saveState();
    renderTasks();
  });
}

// ── LOG ──
function addLog(msg) {
  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  state.log.unshift({ time: t, msg });
  if (state.log.length > 20) state.log.pop();
  renderLog();
}
function renderLog() {
  const el = document.getElementById('logEntries');
  if (state.log.length === 0) { el.innerHTML = '<div class="log-empty">No activity yet</div>'; return; }
  el.innerHTML = state.log.map(e => '<div class="log-entry"><span class="log-time">' + e.time + '</span><span>' + escHtml(e.msg) + '</span></div>').join('');
}

// ── STATS ──
function renderStats() {
  document.getElementById('statSessions').textContent = state.sessionsCompleted;
  document.getElementById('statFocus').textContent = state.totalFocusMin + 'm';
  document.getElementById('statDone').textContent = state.tasks.filter(t => t.done).length;
}

function renderHistory() {
  const el = document.getElementById('historyChart');
  if (!el) return;
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d);
  }
  const max = Math.max(1, ...days.map(d => state.history[d.toDateString()] || 0));
  el.innerHTML = days.map(d => {
    const key = d.toDateString();
    const count = state.history[key] || 0;
    const pct = Math.round((count / max) * 100);
    const label = d.toLocaleDateString([], { weekday: 'short' });
    return '<div class="hbar-col">'
      + '<div class="hbar-fill" style="height:' + pct + '%"></div>'
      + '<div class="hbar-count">' + (count || '') + '</div>'
      + '<div class="hbar-label">' + label + '</div>'
      + '</div>';
  }).join('');
}

function saveState() {
  const s = getSettings();
  const toSave = {
    tasks: state.tasks.map(({ _notesOpen, ...t }) => t),
    sessionsCompleted: state.sessionsCompleted,
    totalFocusMin: state.totalFocusMin,
    sessionInCycle: state.sessionInCycle,
    log: state.log.slice(0, 50),
    lastDate: state.lastDate,
    soundEnabled: state.soundEnabled,
    history: state.history,
    settings: { work: s.work, short: s.short, long: s.long }
  };
  localStorage.setItem('pomoday_state', JSON.stringify(toSave));
}

function loadState() {
  try {
    const raw = localStorage.getItem('pomoday_state');
    if (!raw) return;
    const saved = JSON.parse(raw);
    state.tasks = (saved.tasks || []).map(t => ({ notes: '', ...t }));
    state.sessionsCompleted = saved.sessionsCompleted || 0;
    state.totalFocusMin = saved.totalFocusMin || 0;
    state.sessionInCycle = saved.sessionInCycle || 0;
    state.log = saved.log || [];
    state.lastDate = saved.lastDate || null;
    state.soundEnabled = saved.soundEnabled !== undefined ? saved.soundEnabled : true;
    state.history = saved.history || {};
    if (saved.settings) {
      document.getElementById('setWork').value = saved.settings.work || 25;
      document.getElementById('setShort').value = saved.settings.short || 5;
      document.getElementById('setLong').value = saved.settings.long || 15;
    }
  } catch (e) {
    console.warn('Could not restore state:', e);
  }
}

function checkDailyReset() {
  const today = new Date().toDateString();
  if (!state.lastDate) { state.lastDate = today; return; }
  if (state.lastDate === today) return;
  updateNewDayButton();
}

function startNewDay() {
  const today = new Date().toDateString();
  const donePrev = state.tasks.filter(t => t.done).length;
  let sessPrev = state.sessionsCompleted;

  if (state.running && state.mode === 'work') {
    const elapsedMin = Math.floor((state.totalSeconds - state.seconds) / 60);
    if (elapsedMin > 0) {
      state.totalFocusMin += elapsedMin;
      sessPrev++;
      const prevDate = state.lastDate || today;
      state.history[prevDate] = (state.history[prevDate] || 0) + 1;
      addLog('Credited partial session to previous day');
    }
    pauseTimer();
  }

  state.tasks = state.tasks.filter(t => !t.done);
  state.sessionsCompleted = 0;
  state.totalFocusMin = 0;
  state.sessionInCycle = 0;
  state.log = [];
  state.lastDate = today;
  saveState();
  showDayBanner(donePrev, sessPrev);
  renderStats();
  renderHistory();
  renderLog();
  renderTasks();
  updateNewDayButton();
}

function updateNewDayButton() {
  const btn = document.getElementById('btnNewDay');
  if (!btn) return;
  const today = new Date().toDateString();
  if (state.lastDate === today) {
    btn.style.display = 'none';
  } else {
    btn.style.display = 'block';
  }
}

function showDayBanner(doneTasks, sessions) {
  const el = document.getElementById('dayBanner');
  if (!el) return;
  el.querySelector('.day-banner-text').textContent =
    'Yesterday: ' + doneTasks + ' task' + (doneTasks !== 1 ? 's' : '') +
    ' done, ' + sessions + ' session' + (sessions !== 1 ? 's' : '') + ' completed.';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 6000);
}

// ── NOTIFY ──
let notifyTimer;
function notificationsSupported() {
  return typeof Notification !== 'undefined';
}
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function playBeep(freq, duration) {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  document.getElementById('btnSound').style.opacity = state.soundEnabled ? '1' : '0.35';
  saveState();
}
function notify(title, body) {
  const el = document.getElementById('notify');
  document.getElementById('notifyTitle').textContent = title;
  document.getElementById('notifyBody').textContent = body;
  el.classList.add('show');
  clearTimeout(notifyTimer);
  notifyTimer = setTimeout(() => el.classList.remove('show'), 4000);
  if (notificationsSupported()) {
    if (Notification.permission === 'granted') new Notification(title, { body });
    else if (Notification.permission !== 'denied') Notification.requestPermission();
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
loadState();
checkDailyReset();
applyColor(COLORS.work);
renderClock();
renderDots();
renderTasks();
renderLog();
renderStats();
renderHistory();
initDragDrop();
document.getElementById('btnSound').style.opacity = state.soundEnabled ? '1' : '0.35';
updateNewDayButton();
if (notificationsSupported() && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
</body>
</html>
