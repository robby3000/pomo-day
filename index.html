<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>POMO / DAY PLANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
    --work-color: #e8ff47;
    --short-color: #47d9ff;
    --long-color: #b47fff;
    --done-color: #4dff9b;
    --radius: 4px;
    --mode-color: #e8ff47;
  }

  html, body {
    height: 100%;
    height: 100dvh;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 100%; height: 1px;
    background: linear-gradient(90deg, var(--mode-color) 0%, transparent 60%);
    transition: background .4s;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--mode-color);
    transition: color .4s;
  }
  .logo span { color: var(--muted); }
  .header-stats {
    display: flex; gap: 20px;
    font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  }
  .header-stats strong { color: var(--text); font-size: 13px; display: block; margin-top: 1px; }

  /* ── TAB NAV (mobile bottom nav) ── */
  .tab-nav {
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .tab-nav-btn {
    flex: 1;
    padding: 12px 0 10px;
    background: none; border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-top: 2px solid transparent;
    transition: all .15s;
  }
  .tab-nav-btn.active {
    color: var(--mode-color);
    border-top-color: var(--mode-color);
  }
  .tab-nav-btn .nav-icon { display: block; font-size: 18px; margin-bottom: 2px; }

  /* ── PAGES ── */
  .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .page.active { display: flex; }

  /* ── TIMER PAGE ── */
  .timer-page {
    align-items: center;
    padding: 16px 20px 12px;
    gap: 14px;
    overflow-y: auto;
  }

  .mode-tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    padding: 3px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    width: 100%;
  }
  .mode-tab {
    flex: 1;
    padding: 6px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all .15s;
    white-space: nowrap;
  }
  .mode-tab.active {
    background: var(--mode-color);
    color: #000;
    font-weight: 500;
  }

  /* CLOCK */
  .clock-container {
    position: relative;
    width: min(220px, 60vw);
    height: min(220px, 60vw);
    flex-shrink: 0;
  }
  .clock-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .clock-track { fill: none; stroke: var(--surface2); stroke-width: 10; }
  .clock-progress {
    fill: none; stroke-width: 10;
    stroke-linecap: round;
    stroke: var(--mode-color);
    transition: stroke-dashoffset 1s linear, stroke .4s;
    filter: drop-shadow(0 0 8px var(--mode-color));
  }
  .clock-inner {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 14vw, 68px);
    line-height: 1;
    letter-spacing: 2px;
    color: var(--text);
  }
  .mode-label {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--mode-color);
    margin-top: 3px;
  }

  /* DOTS */
  .session-dots { display: flex; gap: 8px; align-items: center; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border);
    transition: all .3s;
  }
  .dot.done { background: var(--work-color); border-color: var(--work-color); box-shadow: 0 0 6px var(--work-color); }
  .dot.current { background: var(--mode-color); border-color: var(--mode-color); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* CONTROLS */
  .controls { display: flex; gap: 10px; align-items: center; width: 100%; justify-content: center; }
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: var(--mode-color);
    color: #000;
    border-color: var(--mode-color);
    font-weight: 500;
    min-width: 110px;
  }
  .btn-ghost {
    background: none; color: var(--muted);
    border-color: var(--border);
  }

  /* CURRENT TASK */
  .current-task-block {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--mode-color);
    padding: 10px 14px;
    border-radius: var(--radius);
    transition: border-color .4s;
  }
  .current-task-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .current-task-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .current-task-name.empty { color: var(--muted); font-style: italic; }

  /* SETTINGS */
  .settings-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%;
  }
  .setting-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    text-align: center;
  }
  .setting-block label { display: block; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .setting-block input[type=number] {
    width: 100%; background: none; border: none; outline: none;
    font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--text);
    text-align: center; cursor: pointer;
  }
  .setting-block input[type=number]::-webkit-inner-spin-button { opacity: 0; }

  /* ── TASKS PAGE ── */
  .tasks-page { overflow: hidden; }

  .panel-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px; letter-spacing: 3px; color: var(--text);
  }
  .task-count {
    font-size: 10px; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 20px;
  }

  .add-task-row {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
    flex-shrink: 0;
    align-items: center;
  }
  .add-task-input {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
    outline: none; transition: border-color .15s;
  }
  .add-task-input:focus { border-color: var(--accent); }
  .add-task-input::placeholder { color: var(--muted); }
  .pomo-count-input {
    width: 42px; text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 4px;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text);
    outline: none;
  }
  .pomo-count-input::-webkit-inner-spin-button { opacity: 0; }

  .task-list {
    flex: 1; overflow-y: auto;
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 6px;
    -webkit-overflow-scrolling: touch;
  }
  .task-list::-webkit-scrollbar { width: 3px; }
  .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .task-item::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--accent);
    opacity: 0; transition: opacity .15s;
  }
  .task-item.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .task-item.active::before { opacity: 1; }
  .task-item.done { opacity: .45; }
  .task-item.done .task-name { text-decoration: line-through; }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 50%; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
    font-size: 11px;
  }
  .task-item.done .task-check { background: var(--done-color); border-color: var(--done-color); color: #000; }

  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-pomo-info { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .mini-dots { display: flex; gap: 3px; }
  .mini-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); }
  .mini-dot.done { background: var(--work-color); }
  .mini-dot.current { background: var(--accent2); animation: pulse 1.5s infinite; }

  .task-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 18px;
    transition: color .15s;
    flex-shrink: 0; padding: 4px 6px;
    -webkit-tap-highlight-color: transparent;
  }
  .task-delete:active { color: var(--accent2); }

  .empty-tasks {
    padding: 40px 20px; text-align: center;
    color: var(--muted); font-size: 11px; letter-spacing: 1px;
  }
  .empty-tasks .big { font-family: 'Bebas Neue', sans-serif; font-size: 28px; display: block; color: var(--surface2); letter-spacing: 3px; margin-bottom: 8px; }

  /* LOG */
  .log-panel {
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    max-height: 90px;
    overflow-y: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .log-header { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .log-entry {
    font-size: 10px; color: var(--muted);
    padding: 2px 0;
    border-bottom: 1px solid var(--surface2);
    display: flex; gap: 10px;
  }
  .log-time { color: var(--mode-color); flex-shrink: 0; }
  .log-empty { font-size: 10px; color: var(--surface2); font-style: italic; }

  /* NOTIFY */
  .notify {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%) translateY(-6px);
    background: var(--surface);
    border: 1px solid var(--mode-color);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 12px; color: var(--text);
    box-shadow: 0 0 24px color-mix(in srgb, var(--mode-color) 30%, transparent);
    opacity: 0;
    transition: all .3s;
    z-index: 100; pointer-events: none;
    width: calc(100% - 32px); max-width: 320px;
  }
  .notify.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .notify-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--mode-color); }

  /* DESKTOP: side-by-side layout */
  @media (min-width: 700px) {
    body {
      display: grid;
      grid-template-columns: 1fr min(340px, 38vw);
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    header { grid-column: 1 / -1; }
    .tab-nav { display: none; }

    .page { display: flex !important; }

    .timer-page {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 32px 36px 24px;
      gap: 22px;
    }

    .clock-container {
      width: 260px; height: 260px;
    }

    .tasks-page { grid-row: 2; grid-column: 2; overflow: hidden; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">POMO<span>/</span>DAY</div>
  <div class="header-stats">
    <div>Sessions<strong id="statSessions">0</strong></div>
    <div>Focus<strong id="statFocus">0m</strong></div>
    <div>Done<strong id="statDone">0</strong></div>
  </div>
</header>

<!-- TIMER PAGE -->
<div class="page timer-page active" id="pageTimer">

  <div class="mode-tabs" id="modeTabs">
    <button class="mode-tab active" data-mode="work">Work</button>
    <button class="mode-tab" data-mode="short">Short Brk</button>
    <button class="mode-tab" data-mode="long">Long Brk</button>
  </div>

  <div class="clock-container">
    <svg class="clock-svg" viewBox="0 0 280 280">
      <circle class="clock-track" cx="140" cy="140" r="122"/>
      <circle class="clock-progress" id="clockRing" cx="140" cy="140" r="122"
        stroke-dasharray="766.5" stroke-dashoffset="0"/>
    </svg>
    <div class="clock-inner">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="mode-label" id="modeLabel">Work</div>
    </div>
  </div>

  <div class="session-dots" id="sessionDots"></div>

  <div class="controls">
    <button class="btn btn-ghost" onclick="resetTimer()">↺ Reset</button>
    <button class="btn btn-primary" id="btnStart" onclick="toggleTimer()">START</button>
    <button class="btn btn-ghost" onclick="skipSession()">Skip →</button>
  </div>

  <div class="current-task-block">
    <div class="current-task-label">Now working on</div>
    <div class="current-task-name empty" id="currentTaskName">— no task selected —</div>
  </div>

  <div class="settings-row">
    <div class="setting-block">
      <label>Work</label>
      <input type="number" id="setWork" value="25" min="1" max="90" onchange="updateSettings()">
    </div>
    <div class="setting-block">
      <label>Short Brk</label>
      <input type="number" id="setShort" value="5" min="1" max="30" onchange="updateSettings()">
    </div>
    <div class="setting-block">
      <label>Long Brk</label>
      <input type="number" id="setLong" value="15" min="1" max="60" onchange="updateSettings()">
    </div>
  </div>

</div>

<!-- TASKS PAGE -->
<div class="page tasks-page" id="pageTasks">
  <div class="panel-header">
    <div class="panel-title">Today's Tasks</div>
    <div class="task-count" id="taskCount">0 tasks</div>
  </div>

  <div class="add-task-row">
    <input class="add-task-input" id="taskInput" type="text" placeholder="Add a task…" maxlength="60"
      onkeydown="if(event.key==='Enter') addTask()">
    <input class="pomo-count-input" id="pomoInput" type="number" min="1" max="20" value="2" title="Pomodoros">
    <button class="btn btn-primary" style="padding:9px 14px;font-size:11px;" onclick="addTask()">+</button>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="log-panel">
    <div class="log-header">Activity Log</div>
    <div id="logEntries"><div class="log-empty">No activity yet</div></div>
  </div>
</div>

<!-- BOTTOM NAV (mobile only) -->
<nav class="tab-nav">
  <button class="tab-nav-btn active" id="navTimer" onclick="switchTab('timer')">
    <span class="nav-icon">⏱</span>Timer
  </button>
  <button class="tab-nav-btn" id="navTasks" onclick="switchTab('tasks')">
    <span class="nav-icon">📋</span>Tasks
  </button>
</nav>

<div class="notify" id="notify">
  <div class="notify-title" id="notifyTitle">Break time!</div>
  <div id="notifyBody">Good work. Take a breather.</div>
</div>

<script>
const COLORS = { work: '#e8ff47', short: '#47d9ff', long: '#b47fff' };
const LABELS = { work: 'Work', short: 'Short Break', long: 'Long Break' };

let state = {
  mode: 'work',
  running: false,
  seconds: 25 * 60,
  totalSeconds: 25 * 60,
  sessionInCycle: 0,
  sessionsCompleted: 0,
  totalFocusMin: 0,
  tasks: [],
  activeTaskId: null,
  log: []
};

let timer = null;
const CIRCUMFERENCE = 2 * Math.PI * 122;

// ── TAB SWITCH ──
function switchTab(tab) {
  document.getElementById('pageTimer').classList.toggle('active', tab === 'timer');
  document.getElementById('pageTasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('navTimer').classList.toggle('active', tab === 'timer');
  document.getElementById('navTasks').classList.toggle('active', tab === 'tasks');
}

// ── SETTINGS ──
function getSettings() {
  return {
    work: parseInt(document.getElementById('setWork').value) || 25,
    short: parseInt(document.getElementById('setShort').value) || 5,
    long: parseInt(document.getElementById('setLong').value) || 15
  };
}
function updateSettings() {
  if (!state.running) {
    const s = getSettings();
    state.totalSeconds = s[state.mode] * 60;
    state.seconds = state.totalSeconds;
    renderClock();
  }
}

// ── MODE ──
function setMode(mode) {
  if (state.running) return;
  state.mode = mode;
  const s = getSettings();
  state.totalSeconds = s[mode] * 60;
  state.seconds = state.totalSeconds;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('modeLabel').textContent = LABELS[mode];
  applyColor(COLORS[mode]);
  renderClock();
}

function applyColor(color) {
  document.documentElement.style.setProperty('--mode-color', color);
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => setMode(tab.dataset.mode));
});

// ── TIMER ──
function toggleTimer() {
  state.running ? pauseTimer() : startTimer();
}
function startTimer() {
  state.running = true;
  document.getElementById('btnStart').textContent = 'PAUSE';
  timer = setInterval(tick, 1000);
}
function pauseTimer() {
  state.running = false;
  clearInterval(timer);
  document.getElementById('btnStart').textContent = 'START';
}
function resetTimer() {
  pauseTimer();
  const s = getSettings();
  state.seconds = s[state.mode] * 60;
  state.totalSeconds = state.seconds;
  renderClock();
}
function skipSession() {
  pauseTimer();
  onSessionEnd(true);
}
function tick() {
  if (state.seconds <= 0) { onSessionEnd(false); return; }
  state.seconds--;
  renderClock();
}
function onSessionEnd(skipped) {
  pauseTimer();
  if (!skipped && state.mode === 'work') {
    state.sessionsCompleted++;
    state.sessionInCycle++;
    state.totalFocusMin += getSettings().work;
    addLog('Completed work session');
    if (state.activeTaskId) {
      const t = state.tasks.find(t => t.id === state.activeTaskId);
      if (t && t.pomoDone < t.pomoEstimate) { t.pomoDone++; renderTasks(); }
    }
    if (state.sessionInCycle >= 4) {
      state.sessionInCycle = 0;
      notify('Long Break!', 'You finished 4 sessions. Enjoy a long rest.');
      setMode('long');
    } else {
      notify('Short Break!', 'Nice work. Take a quick breather.');
      setMode('short');
    }
  } else if (!skipped && (state.mode === 'short' || state.mode === 'long')) {
    addLog('Finished ' + LABELS[state.mode]);
    notify('Back to work!', "Break over. Let's go again.");
    setMode('work');
  } else {
    if (state.mode === 'work') setMode('short'); else setMode('work');
  }
  renderStats();
  renderDots();
  saveState();
  startTimer();
}

// ── CLOCK ──
function renderClock() {
  const mins = Math.floor(state.seconds / 60).toString().padStart(2, '0');
  const secs = (state.seconds % 60).toString().padStart(2, '0');
  document.getElementById('timeDisplay').textContent = mins + ':' + secs;
  const pct = state.seconds / state.totalSeconds;
  document.getElementById('clockRing').style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
}

// ── DOTS ──
function renderDots() {
  const container = document.getElementById('sessionDots');
  container.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    if (i < state.sessionInCycle) d.classList.add('done');
    else if (i === state.sessionInCycle && state.mode === 'work') d.classList.add('current');
    container.appendChild(d);
  }
}

// ── TASKS ──
function addTask() {
  const input = document.getElementById('taskInput');
  const pomoIn = document.getElementById('pomoInput');
  const name = input.value.trim();
  if (!name) return;
  state.tasks.push({ id: Date.now(), name, pomoEstimate: parseInt(pomoIn.value) || 2, pomoDone: 0, done: false });
  input.value = ''; pomoIn.value = '2';
  input.focus();
  renderTasks();
  addLog('Added: "' + name + '"');
  saveState();
}

function selectTask(id) {
  state.activeTaskId = state.activeTaskId === id ? null : id;
  renderTasks();
  const t = state.tasks.find(t => t.id === id);
  const el = document.getElementById('currentTaskName');
  if (state.activeTaskId && t) { el.textContent = t.name; el.classList.remove('empty'); }
  else { el.textContent = '— no task selected —'; el.classList.add('empty'); }
}

function toggleDone(id, e) {
  e.stopPropagation();
  const t = state.tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done && state.activeTaskId === id) {
    state.activeTaskId = null;
    document.getElementById('currentTaskName').textContent = '— no task selected —';
    document.getElementById('currentTaskName').classList.add('empty');
    addLog('Completed: "' + t.name + '"');
  }
  renderTasks(); renderStats();
  saveState();
}

function deleteTask(id, e) {
  e.stopPropagation();
  state.tasks = state.tasks.filter(t => t.id !== id);
  if (state.activeTaskId === id) {
    state.activeTaskId = null;
    document.getElementById('currentTaskName').textContent = '— no task selected —';
    document.getElementById('currentTaskName').classList.add('empty');
  }
  renderTasks(); renderStats();
  saveState();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  if (state.tasks.length === 0) {
    list.innerHTML = '<div class="empty-tasks"><span class="big">NO TASKS</span>Add something to focus on ↑</div>';
    document.getElementById('taskCount').textContent = '0 tasks';
    return;
  }
  const sorted = [...state.tasks].sort((a, b) => {
    if (a.id === state.activeTaskId) return -1;
    if (b.id === state.activeTaskId) return 1;
    if (a.done !== b.done) return a.done ? 1 : -1;
    return 0;
  });
  list.innerHTML = sorted.map(t => {
    const dots = Array.from({length: t.pomoEstimate}, (_, i) => {
      let cls = 'mini-dot';
      if (i < t.pomoDone) cls += ' done';
      else if (i === t.pomoDone && !t.done && t.id === state.activeTaskId && state.mode === 'work') cls += ' current';
      return '<div class="' + cls + '"></div>';
    }).join('');
    return '<div class="task-item ' + (t.done ? 'done' : '') + ' ' + (t.id === state.activeTaskId ? 'active' : '') + '" onclick="selectTask(' + t.id + ')">'
      + '<div class="task-check" onclick="toggleDone(' + t.id + ', event)">' + (t.done ? '✓' : '') + '</div>'
      + '<div class="task-info">'
      + '<div class="task-name">' + escHtml(t.name) + '</div>'
      + '<div class="task-pomo-info"><div class="mini-dots">' + dots + '</div><span>' + t.pomoDone + '/' + t.pomoEstimate + ' pomo</span></div>'
      + '</div>'
      + '<button class="task-delete" onclick="deleteTask(' + t.id + ', event)" title="Remove">×</button>'
      + '</div>';
  }).join('');
  const done = state.tasks.filter(t => t.done).length;
  document.getElementById('taskCount').textContent = done + '/' + state.tasks.length + ' done';
}

// ── LOG ──
function addLog(msg) {
  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  state.log.unshift({ time: t, msg });
  if (state.log.length > 20) state.log.pop();
  renderLog();
}
function renderLog() {
  const el = document.getElementById('logEntries');
  if (state.log.length === 0) { el.innerHTML = '<div class="log-empty">No activity yet</div>'; return; }
  el.innerHTML = state.log.map(e => '<div class="log-entry"><span class="log-time">' + e.time + '</span><span>' + escHtml(e.msg) + '</span></div>').join('');
}

// ── STATS ──
function renderStats() {
  document.getElementById('statSessions').textContent = state.sessionsCompleted;
  document.getElementById('statFocus').textContent = state.totalFocusMin + 'm';
  document.getElementById('statDone').textContent = state.tasks.filter(t => t.done).length;
}

function saveState() {
  const toSave = {
    tasks: state.tasks,
    sessionsCompleted: state.sessionsCompleted,
    totalFocusMin: state.totalFocusMin,
    sessionInCycle: state.sessionInCycle,
    log: state.log.slice(0, 50)
  };
  localStorage.setItem('pomoday_state', JSON.stringify(toSave));
}

function loadState() {
  try {
    const raw = localStorage.getItem('pomoday_state');
    if (!raw) return;
    const saved = JSON.parse(raw);
    state.tasks = saved.tasks || [];
    state.sessionsCompleted = saved.sessionsCompleted || 0;
    state.totalFocusMin = saved.totalFocusMin || 0;
    state.sessionInCycle = saved.sessionInCycle || 0;
    state.log = saved.log || [];
  } catch (e) {
    console.warn('Could not restore state:', e);
  }
}

// ── NOTIFY ──
let notifyTimer;
function notificationsSupported() {
  return typeof Notification !== 'undefined';
}
function notify(title, body) {
  const el = document.getElementById('notify');
  document.getElementById('notifyTitle').textContent = title;
  document.getElementById('notifyBody').textContent = body;
  el.classList.add('show');
  clearTimeout(notifyTimer);
  notifyTimer = setTimeout(() => el.classList.remove('show'), 4000);
  if (notificationsSupported()) {
    if (Notification.permission === 'granted') new Notification(title, { body });
    else if (Notification.permission !== 'denied') Notification.requestPermission();
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──
loadState();
applyColor(COLORS.work);
renderClock();
renderDots();
renderTasks();
renderLog();
renderStats();
if (notificationsSupported() && Notification.permission === 'default') {
  Notification.requestPermission();
}
</script>
